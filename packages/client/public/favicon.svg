<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#38bdf8" stroke-width="0.3">
    <line x1="8" y1="4" x2="8" y2="28"/>
    <line x1="16" y1="4" x2="16" y2="28"/>
    <line x1="24" y1="4" x2="24" y2="28"/>
    <line x1="4" y1="10" x2="28" y2="10"/>
    <line x1="4" y1="18" x2="28" y2="18"/>
    <line x1="4" y1="26" x2="28" y2="26"/>
  </g>
  <!-- T letter -->
  <text x="16" y="24" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#accent)" text-anchor="middle">T</text>
</svg>
