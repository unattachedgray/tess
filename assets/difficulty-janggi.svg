<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="12" fill="url(#bg)"/>
  <text x="300" y="24" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="2">JANGGI (Korean Chess)</text>
  <!-- Scale bar -->
  <rect x="40" y="40" width="520" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="40" width="104" height="28" rx="14" fill="#ef4444" opacity="0.25"/>
  <rect x="144" y="40" width="104" height="28" fill="#f59e0b" opacity="0.2"/>
  <rect x="248" y="40" width="104" height="28" fill="#38bdf8" opacity="0.2"/>
  <rect x="352" y="40" width="104" height="28" fill="#818cf8" opacity="0.2"/>
  <rect x="456" y="40" width="104" height="28" rx="14" fill="#22c55e" opacity="0.25"/>
  <!-- Labels -->
  <text x="92" y="58" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">Beginner</text>
  <text x="196" y="58" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#f59e0b" text-anchor="middle">Casual</text>
  <text x="300" y="58" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#38bdf8" text-anchor="middle">Club</text>
  <text x="404" y="58" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#818cf8" text-anchor="middle">Pro</text>
  <text x="508" y="58" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">Superhuman</text>
  <!-- Rank labels -->
  <text x="92" y="82" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">~9급</text>
  <text x="196" y="82" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">~5급</text>
  <text x="300" y="82" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">~2단</text>
  <text x="404" y="82" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">~5단</text>
  <text x="508" y="82" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">~7단+</text>
  <!-- References -->
  <g font-family="system-ui, sans-serif" font-size="9" fill="#64748b">
    <line x1="92" y1="92" x2="92" y2="102" stroke="#475569" stroke-width="1"/>
    <text x="92" y="112" text-anchor="middle">Hobbyist</text>
    <text x="92" y="123" text-anchor="middle" fill="#475569">Learning rules</text>
    <line x1="196" y1="92" x2="196" y2="102" stroke="#475569" stroke-width="1"/>
    <text x="196" y="112" text-anchor="middle">Online player</text>
    <text x="196" y="123" text-anchor="middle" fill="#475569">Knows tactics</text>
    <line x1="300" y1="92" x2="300" y2="102" stroke="#475569" stroke-width="1"/>
    <text x="300" y="112" text-anchor="middle">Janggi club</text>
    <text x="300" y="123" text-anchor="middle" fill="#475569">Regular competitor</text>
    <line x1="404" y1="92" x2="404" y2="102" stroke="#475569" stroke-width="1"/>
    <text x="404" y="112" text-anchor="middle">Pro candidate</text>
    <text x="404" y="123" text-anchor="middle" fill="#475569">KJA rated</text>
    <line x1="508" y1="92" x2="508" y2="102" stroke="#475569" stroke-width="1"/>
    <text x="508" y="112" text-anchor="middle">Beyond 기왕</text>
    <text x="508" y="123" text-anchor="middle" fill="#475569">Engine strength</text>
  </g>
  <!-- Famous markers -->
  <g font-family="system-ui, sans-serif" font-size="8">
    <circle cx="196" cy="148" r="3" fill="#f59e0b"/>
    <text x="196" y="162" fill="#f59e0b" text-anchor="middle">피카 (online)</text>
    <circle cx="430" cy="148" r="3" fill="#818cf8"/>
    <text x="430" y="162" fill="#818cf8" text-anchor="middle">기왕전 결승</text>
    <circle cx="480" cy="148" r="3" fill="#a78bfa"/>
    <text x="480" y="162" fill="#a78bfa" text-anchor="middle">박성현 기왕</text>
    <circle cx="530" cy="148" r="3" fill="#22c55e"/>
    <text x="530" y="162" fill="#22c55e" text-anchor="middle">Tess AI</text>
  </g>
  <!-- Note -->
  <text x="300" y="188" font-family="system-ui, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Powered by Fairy-Stockfish largeboard — strongest open-source Janggi engine</text>
</svg>
